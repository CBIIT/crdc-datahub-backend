        disabled: true
      - _id: "data_submission:confirm"
        group: "Data Submission"
        name: "Confirm Data Submissions"
        checked: false
        disabled: false
      # Admin
      - _id: "user:manage"
        group: "Admin"
        name: "Manage Users"
        checked: false
        disabled: false
      - _id: "program:manage"
        group: "Admin"
        name: "Manage Programs"
        checked: false
        disabled: false
      - _id: "study:manage"
        group: "Admin"
        name: "Manage Studies"
        checked: false
        disabled: false
      - _id: "dashboard:view"
        group: "Admin"
        name: "View Operation Dashboards"
        checked: true
        disabled: false
    notifications: 
    # submission request
      - _id: "submission_request:submitted"
        group: "sr"
        name: "Submission Request is received"
        checked: false
        disabled: false
      - _id: "submission_request:to_be_reviewed"
