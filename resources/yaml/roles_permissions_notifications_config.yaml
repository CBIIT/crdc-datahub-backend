        name: "Submission Request is ready for review"
        checked: true
        disabled: false
      - _id: "submission_request:reviewed"
        group: "sr"
        name: "Submission Request review decision"
        checked: false
        disabled: false
      - _id: "submission_request:deleted"
        group: "sr"
        name: "Submission Request Deleted"
        checked: false
        disabled: false
    # data submission
      - _id: "data_submission:submitted"
        group: "ds"
        name: "Data Submission is submitted"
        checked: false
        disabled: false
      - _id: "data_submission:cancelled"
        group: "ds"
        name: "Data Submission is cancelled"
        checked: false
        disabled: false
      - _id: "data_submission:withdrawn"
        group: "ds"
        name: "Data Submission is withdrawn"
        checked: false
        disabled: false
      - _id: "data_submission:released"
        group: "ds"
        name: "Data Submission is released"
        checked: false
        disabled: false
      - _id: "data_submission:completed"
        group: "ds"
        name: "data_submission is completed"
        checked: false
        disabled: false
      - _id: "data_submission:expiring"
        group: "ds"
