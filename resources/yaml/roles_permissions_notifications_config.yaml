        checked: false
        disabled: false
      - _id: "data_submission:deleted"
        group: "ds"
        name: "Data Submission is deleted"
        checked: false
        disabled: false
    # User Account
      - _id: "access:requested"
        group: "User Account"
        name: "User Request Access"
        checked: false
        disabled: true
      - _id: "account:inactivated"
        group: "User Account"
        name: "Account Disabled due to inactivity (to user)"
        checked: true
        disabled: false
      - _id: "account:users_inactivated"
        group: "User Account"
